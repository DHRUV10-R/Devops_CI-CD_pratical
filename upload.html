<!DOCTYPE html>

<body>

    <!-- Navigation -->

            <li><a href="register.html">Register</a></li>

            <li><a href="upload.html" class="active">Upload</a></li>
            <li><a href="edit.html">Edit</a></li>
        </ul>
    </nav>

    <!-- Upload Section -->
    <div class="container">

        <div class="card">

            <h1>Upload File</h1>

            <p>Select a file from your computer and click the Upload button.</p>

            <form id="uploadForm">

                <div class="form-group">
                    <label for="file">Choose File</label>

                    <input
                        type="file"
                        id="file"
                        accept=".jpg,.jpeg,.png,.pdf,.doc,.docx,.txt"
                    >
                </div>

                <button
                    type="button"
                    onclick="uploadFile()"
                >
                    Upload
                </button>

            </form>

            <br>

            <p id="uploadStatus"></p>

            <br>

            <a href="home.html">
                <button type="button">Back to Home</button>
            </a>

        </div>

    </div>

    <script src="js/upload.js"></script>

</body>
</html>
